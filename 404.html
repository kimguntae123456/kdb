<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>404 — 경로 정규화 중…</title>
<meta name="robots" content="noindex">
<style>
  body{font-family:system-ui,-apple-system,sans-serif;max-width:560px;margin:80px auto;padding:0 20px;color:#222}
  h1{font-size:18px;margin:0 0 12px}
  p{font-size:14px;line-height:1.6;color:#555}
  code{background:#f4f4f4;padding:2px 6px;border-radius:4px;font-size:12px;word-break:break-all}
  a{color:#06c}
</style>
</head>
<body>
<h1>404 — 경로 확인 중…</h1>
<p id="msg">한글 URL 인코딩(NFD→NFC) 자동 보정 시도 중입니다.</p>
<p><a id="home" href="/kdb/">메인으로</a></p>
<script>
(function(){
  try{
    var loc = window.location;
    // GitHub Pages 프로젝트 경로 추출 (/kdb/...)
    var path = loc.pathname;
    var hash = loc.hash || '';
    var search = loc.search || '';
    // 디코드 후 NFC 정규화
    var decoded;
    try { decoded = decodeURIComponent(path); } catch(e){ decoded = path; }
    if (typeof decoded.normalize !== 'function') return;
    var nfc = decoded.normalize('NFC');
    if (nfc === decoded) return; // 이미 NFC면 진짜 404
    // NFC 경로로 재인코딩 (슬래시는 유지)
    var nfcPath = nfc.split('/').map(function(seg){
      return encodeURIComponent(seg);
    }).join('/');
    var target = nfcPath + search + hash;
    // 무한 루프 방지: 동일하면 중단
    if (target === path + search + hash) return;
    document.getElementById('msg').textContent = '정규화된 경로로 이동합니다…';
    location.replace(target);
  }catch(e){}
})();
</script>
</body>
</html>
