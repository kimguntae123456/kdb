<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>논술 리더 — POKÉMON EDITION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+KR:wght@400;700;900&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
/* ═══════════════════════════════════════════════
   POKÉMON PIXEL THEME — 논술 리더
   Sprites: raw.githubusercontent.com/PokeAPI/sprites
   Palette: Game Boy Pocket warm + classic Pokémon Red
═══════════════════════════════════════════════ */

:root {
  --bg:       #e8dfc8;
  --paper:    #f5edd8;
  --card:     #faf5e8;
  --navy:     #1c2040;
  --navy2:    #2e3566;
  --red:      #d42b2b;
  --red2:     #9a1818;
  --yellow:   #f0c000;
  --blue:     #3a6ec8;
  --green:    #2c8844;
  --white:    #f8f4e8;
  --border:   3px solid var(--navy);
  --shadow:   4px 4px 0 var(--navy);
  --font-pk:  'Press Start 2P', monospace;
  --font-body:'Pretendard', sans-serif;
  --font-serif:'Noto Serif KR', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 15px, rgba(28,32,64,.05) 15px, rgba(28,32,64,.05) 16px),
    repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(28,32,64,.05) 15px, rgba(28,32,64,.05) 16px);
  font-family: var(--font-body);
  color: var(--navy);
  min-height: 100vh;
}

img { image-rendering: pixelated; image-rendering: crisp-edges; }

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.app { display: grid; grid-template-columns: 272px 1fr; min-height: 100vh; }

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar {
  background: var(--navy);
  border-right: 4px solid var(--yellow);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--yellow) var(--navy2);
}

/* Brand */
.brand {
  background: var(--red);
  padding: 16px 14px 14px;
  border-bottom: 4px solid var(--yellow);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.brand::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: repeating-linear-gradient(90deg,var(--yellow) 0 10px,transparent 10px 20px);
}
.brand-logo {
  font-family: var(--font-pk);
  font-size: .55rem;
  color: #fff;
  text-shadow: 2px 2px 0 var(--red2);
  line-height: 1.9;
  letter-spacing: .5px;
}
.brand-sub {
  font-family: var(--font-pk);
  font-size: .3rem;
  color: var(--yellow);
  letter-spacing: 2px;
  margin-top: 3px;
}
.brand-pokemon {
  position: absolute;
  right: 10px; bottom: 10px;
  width: 52px; height: 52px;
}

/* Nav sections */
.nav-section {
  font-family: var(--font-pk);
  font-size: .28rem;
  color: var(--yellow);
  letter-spacing: 2px;
  padding: 10px 12px 4px;
  border-top: 1px solid rgba(240,192,0,.2);
  margin-top: 4px;
  flex-shrink: 0;
}

/* Nav items */
.nav-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  color: #b8c8e8;
  text-decoration: none;
  font-size: .8rem;
  font-weight: 600;
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background 60ms, border-color 60ms;
  position: relative;
}
.nav-item:hover  { background: rgba(240,192,0,.1); border-left-color: var(--yellow); color: #fff; }
.nav-item.active { background: rgba(212,43,43,.25); border-left-color: var(--red);    color: #fff; }

.nav-sprite {
  width: 32px; height: 32px;
  flex-shrink: 0;
  filter: drop-shadow(1px 1px 0 rgba(0,0,0,.6));
}
.nav-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-count {
  font-family: var(--font-pk);
  font-size: .28rem;
  color: var(--yellow);
  background: rgba(240,192,0,.12);
  padding: 2px 5px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════ */
.main { display: flex; flex-direction: column; min-height: 100vh; }

/* TOPBAR */
.topbar {
  background: var(--navy);
  border-bottom: 3px solid var(--yellow);
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 60;
}
.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--paper);
  border: 3px solid var(--yellow);
  box-shadow: 3px 3px 0 var(--yellow);
  padding: 5px 12px;
}
.search-box input {
  border: none; background: transparent;
  font-family: var(--font-pk); font-size: .38rem;
  color: var(--navy); outline: none; width: 100%;
  letter-spacing: 1px;
}
.search-box input::placeholder { color: #aaa; }
.icon-btn {
  background: var(--red); border: 3px solid var(--navy);
  color: #fff; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 3px 3px 0 var(--navy);
  transition: transform 60ms, box-shadow 60ms; flex-shrink: 0;
}
.icon-btn:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--navy); }

/* PAGE HEAD — battle info screen style */
.page-head {
  background: var(--navy2);
  border-bottom: 4px solid var(--navy);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
  overflow: hidden;
}
.page-head::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
  background: repeating-linear-gradient(90deg,
    var(--red) 0 16px, var(--yellow) 16px 32px,
    var(--blue) 32px 48px, var(--green) 48px 64px);
}
/* Decorative pixels */
.page-head::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 120px; height: 120px;
  background:
    radial-gradient(circle at 70% 30%, rgba(240,192,0,.12) 30%, transparent 70%);
}

.head-sprite-wrap {
  flex-shrink: 0;
  position: relative;
}
.head-sprite {
  width: 96px; height: 96px;
  animation: float 2.4s ease-in-out infinite;
  filter: drop-shadow(0 0 12px rgba(240,192,0,.5));
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.head-info { flex: 1; }
.head-eyebrow {
  font-family: var(--font-pk); font-size: .32rem;
  color: var(--yellow); letter-spacing: 2px; margin-bottom: 6px;
}
.head-title {
  font-family: var(--font-pk); font-size: 1.1rem;
  color: #fff; line-height: 1.4;
  text-shadow: 3px 3px 0 var(--red2);
}
.head-types { display: flex; gap: 6px; margin: 8px 0; }
.type-badge {
  font-family: var(--font-pk); font-size: .26rem;
  padding: 3px 9px; color: #fff; letter-spacing: 1px;
  border: 2px solid rgba(0,0,0,.25); text-shadow: 1px 1px 0 rgba(0,0,0,.3);
}
.type-grass   { background:#5ab030; }
.type-fire    { background:#e04020; }
.type-water   { background:#3060c0; }
.type-electric{ background:#d0a800; color:#333; }
.type-psychic { background:#b03060; }
.type-dragon  { background:#5030e0; }
.type-steel   { background:#9090b0; color:#333; }
.type-normal  { background:#908858; }
.type-dark    { background:#403830; }
.type-ghost   { background:#604870; }

/* HP bar */
.hp-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
.hp-label { font-family:var(--font-pk); font-size:.28rem; color:var(--yellow); flex-shrink:0; }
.hp-track {
  flex:1; height:12px; background:var(--navy);
  border:2px solid var(--yellow); overflow:hidden; max-width:200px;
}
.hp-fill { height:100%; background:linear-gradient(90deg,#1ca040,#60d870); transition:width .6s; }
.hp-fill.yellow { background:linear-gradient(90deg,#d0a000,#f8d840); }
.hp-fill.red    { background:linear-gradient(90deg,#c02020,#f04040); }
.hp-num { font-family:var(--font-pk); font-size:.28rem; color:#ccc; flex-shrink:0; }

/* STATS BAR */
.stats-bar {
  background: var(--navy);
  border-bottom: 3px solid var(--yellow);
  display: flex; gap: 0;
}
.stat-pill {
  flex:1; padding:12px 8px; text-align:center;
  border-right:1px solid rgba(240,192,0,.2);
}
.stat-pill:last-child { border-right:none; }
.stat-val { font-family:var(--font-pk); font-size:1rem; color:var(--yellow); display:block; text-shadow:2px 2px 0 var(--red2); }
.stat-lbl { font-family:var(--font-pk); font-size:.24rem; color:#8898c0; letter-spacing:1px; margin-top:3px; display:block; }

/* ═══════════════════════════════════════════════
   TIMELINE
═══════════════════════════════════════════════ */
.timeline { padding: 20px 32px; counter-reset: row; }

.card-row { display: contents; }

.row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 6px;
  border-bottom: 2px solid rgba(28,32,64,.15);
  cursor: pointer;
  transition: background 60ms;
  counter-increment: row;
  position: relative;
}
.row:hover { background: rgba(240,192,0,.07); margin: 0 -6px; padding-left: 12px; padding-right: 12px; }
.row.expanded { background: rgba(212,43,43,.06); }

/* Row number */
.row-num {
  font-family: var(--font-pk);
  font-size: .36rem;
  color: var(--red);
  flex-shrink: 0;
  width: 30px;
  text-align: right;
}

/* Pokéball SVG icon */
.row-ball { flex-shrink:0; width:22px; height:22px; }

.row-body { flex:1; min-width:0; }
.row-title {
  font-family: var(--font-body);
  font-size: .96rem; font-weight: 700;
  color: var(--navy); line-height: 1.45;
  word-break: keep-all; text-wrap: pretty;
}
.row:hover .row-title { color: var(--red2); }
.row-excerpt {
  font-size: .84rem; color: #667; line-height: 1.6; margin-top:3px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.row-excerpt:empty { display:none; }

.row-actions { flex-shrink:0; }
.bm-btn {
  background:none; border:none; cursor:pointer;
  opacity:.38; transition:opacity 100ms, transform 100ms; padding:4px;
}
.bm-btn:hover { opacity:1; transform:scale(1.2); }
.bm-btn.on { opacity:1; }
.bm-btn.on path { fill:var(--red); }

/* ── INLINE ARTICLE ── */
.inline-article {
  display: none;
  margin: 0 -32px;
  background: var(--card);
  border-top: 4px solid var(--navy);
  border-bottom: 4px solid var(--navy);
  position: relative;
  overflow: hidden;
}
.inline-article::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:7px;
  background:repeating-linear-gradient(90deg,
    var(--red) 0 20px,var(--yellow) 20px 40px,
    var(--blue) 40px 60px,var(--green) 60px 80px);
}

.row.expanded + .inline-article { display:block; animation: ia-in 180ms ease-out; }
@keyframes ia-in { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

/* Battle banner */
.ia-battle {
  background: var(--navy);
  padding: 28px 32px 14px;
  display: flex; align-items: center; justify-content: space-between; gap:20px;
  border-bottom: 3px solid var(--yellow);
}
.ia-enemy {
  display:flex; align-items:center; gap:16px;
}
.ia-enemy-sprite {
  width:80px; height:80px;
  animation: battle-bob 1s steps(2) infinite;
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,.4));
}
@keyframes battle-bob {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
}
.ia-enemy-info {}
.ia-enemy-name {
  font-family:var(--font-pk); font-size:.42rem; color:#fff;
  text-shadow:2px 2px 0 var(--red2); margin-bottom:5px; line-height:1.5;
  max-width:520px; word-break:keep-all;
}
.ia-enemy-lv {
  font-family:var(--font-pk); font-size:.28rem; color:var(--yellow); margin-bottom:6px;
}

.ia-close {
  position:absolute; top:10px; right:14px;
  background:var(--red); border:3px solid var(--navy);
  color:#fff; width:36px; height:36px;
  font-family:var(--font-pk); font-size:.5rem;
  cursor:pointer; box-shadow:3px 3px 0 var(--navy);
  display:flex; align-items:center; justify-content:center;
  transition:transform 60ms, box-shadow 60ms;
}
.ia-close:hover { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--navy); }

/* Article body */
.ia-body { padding:28px 40px 36px; }

.ia-kicker {
  font-family:var(--font-pk); font-size:.3rem;
  color:var(--red); letter-spacing:2px; margin-bottom:10px;
}
.ia-title {
  font-family:var(--font-serif); font-size:1.5rem; font-weight:900;
  color:var(--navy); line-height:1.3; margin-bottom:20px;
  word-break:keep-all; padding-right:36px;
}
.article-content {
  font-size:.93rem; line-height:1.9; color:#334; word-break:keep-all;
}
.article-content p { margin-bottom:1.1em; text-wrap:pretty; }
.article-content ul { padding-left:1.5em; margin:.6em 0; }
.article-content li { margin-bottom:.45em; }
.article-content strong { color:var(--navy2); }
.article-content h3 {
  font-family:var(--font-serif); font-size:1.1rem; font-weight:900;
  color:var(--navy2); margin:1.8em 0 .5em;
  padding:8px 12px 8px 16px;
  background:rgba(28,32,64,.06);
  border-left:5px solid var(--red);
}

/* Text dialog box (pixel) */
.pk-dialog {
  background:var(--white); border:var(--border);
  box-shadow:var(--shadow); padding:14px 18px;
  margin:16px 0;
  font-family:var(--font-pk); font-size:.35rem;
  color:var(--navy); line-height:2;
  position:relative;
}
.pk-dialog::before {
  content:'▼';
  position:absolute; bottom:8px; right:12px;
  font-size:.3rem; color:var(--navy); animation:blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ═══════════════════════════════════════════════
   WALKING POKEMON
═══════════════════════════════════════════════ */
.walker {
  position:fixed; bottom:16px; right:16px; z-index:200;
  width:56px; pointer-events:none;
  animation:walk-r 12s linear infinite;
}
@keyframes walk-r {
  0%   { right:16px;           transform:scaleX(1);  }
  44%  { right:calc(100vw - 72px); transform:scaleX(1);  }
  45%  { right:calc(100vw - 72px); transform:scaleX(-1); }
  89%  { right:16px;           transform:scaleX(-1); }
  90%  { right:16px;           transform:scaleX(1);  }
  100% { right:16px;           transform:scaleX(1);  }
}

/* ═══════════════════════════════════════════════
   PIXEL DECORATIONS
═══════════════════════════════════════════════ */
/* Dotted separator */
.pk-divider {
  border:none;
  height:6px;
  background:repeating-linear-gradient(90deg,
    var(--navy) 0 6px, transparent 6px 12px);
  margin: 0 0 20px;
  opacity:.25;
}

/* ═══════════════════════════════════════════════
   TWEAKS PANEL
═══════════════════════════════════════════════ */
#tweaks {
  position:fixed; bottom:80px; left:16px; z-index:500;
  background:var(--paper); border:var(--border); box-shadow:var(--shadow);
  padding:14px 14px 16px; width:210px; display:none;
}
#tweaks.open { display:block; }
.tweaks-head {
  font-family:var(--font-pk); font-size:.38rem; color:var(--red);
  letter-spacing:1px; margin-bottom:10px;
  border-bottom:2px solid var(--navy); padding-bottom:6px;
}
.tweak-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.tweak-lbl { font-family:var(--font-pk); font-size:.27rem; color:var(--navy); flex:1; }
.tweak-opt {
  font-family:var(--font-pk); font-size:.25rem;
  padding:3px 7px; border:2px solid var(--navy); background:var(--bg); cursor:pointer;
  box-shadow:2px 2px 0 var(--navy); transition:background 60ms;
}
.tweak-opt:hover { background:var(--yellow); }
.tweak-opt.on    { background:var(--red); color:#fff; box-shadow:none; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media (max-width:860px) {
  .app { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .timeline { padding:16px 18px; }
  .page-head { padding:16px 18px; }
  .inline-article { margin:0 -18px; }
  .ia-body { padding:20px 22px 28px; }
}

/* scrollbar */
::-webkit-scrollbar { width:7px; }
::-webkit-scrollbar-track { background:var(--navy); }
::-webkit-scrollbar-thumb { background:var(--yellow); border:2px solid var(--navy); }
</style>
</head>
<body>

<img class="walker" id="walker" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="">

// HP color
function hpColor(pct) {
  if (pct > 50) return '';
  if (pct > 20) return 'yellow';
  return 'red';
}

// Type badge HTML
function typeBadges(types) {
  return types.map(([cls,label]) => `<span class="type-badge type-${cls}">${label}</span>`).join('');
}

// Render rows
function renderRows() {
  const container = document.getElementById('rows-container');
  container.innerHTML = '';

  articles.forEach((a, i) => {
    const ball = i < 3 ? ballSVG() : (i < 5 ? greatBall : ballSVG('#f0c000'));
    const hpPct = a.hp;
    const hpCls = hpColor(hpPct);
    const num = String(i+1).padStart(2,'0');
    const spriteUrl = SPRITE(a.pkmn, shiny, gen);

    const rowEl = document.createElement('div');
    rowEl.className = 'card-row';
    rowEl.innerHTML = `
      <div class="row" onclick="toggleRow(this)">
        <div class="row-num">${num}</div>
        <div class="row-ball">${ball}</div>
        <div class="row-body">

              <div style="display:flex;gap:5px;margin-bottom:8px">${typeBadges(a.types)}</div>
              <div class="hp-row">
                <span class="hp-label">HP</span>
                <div class="hp-track"><div class="hp-fill ${hpCls}" style="width:${hpPct}%"></div></div>
                <span class="hp-num">${hpPct}/100</span>
              </div>
            </div>
          </div>

        <div class="ia-body">
          <div class="ia-kicker">▶ ESG · 논술 요약</div>
          <h2 class="ia-title">${a.title}</h2>
          <div class="article-content">${a.content}</div>
        </div>
      </div>
    `;
    container.appendChild(rowEl);
  });
}

function toggleRow(row) {
  const wasOpen = row.classList.contains('expanded');
  document.querySelectorAll('.row.expanded').forEach(r => r.classList.remove('expanded'));
  if (!wasOpen) row.classList.add('expanded');
  // smooth scroll into view
  if (!wasOpen) {
    setTimeout(() => {
      const art = row.nextElementSibling;
      if (art) {
        const top = art.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }, 50);
  }
}

function closeArticle(btn) {
  btn.closest('.inline-article').previousElementSibling.classList.remove('expanded');
}

// ── WALKER ──
const walkers = [25,133,1,4,7,39,143,54,52,35,94,130,149,151,6,9,3,248,79,137,59,150,151,243];
let wi = 0;
let shiny = false;
let gen = 1;

function updateWalker() {
  document.getElementById('walker').src = SPRITE(walkers[wi], shiny, gen);
}
function nextWalker() {
  wi = (wi + 1) % walkers.length;
  updateWalker();
}
function setGen(g) {
  gen = g;
  document.getElementById('gen-1-btn').classList.toggle('on', g===1);
  document.getElementById('gen-2-btn').classList.toggle('on', g===2);
  updateWalker();
  renderRows();
}
function toggleShiny() {
  shiny = !shiny;
  document.getElementById('shiny-btn').textContent = shiny ? 'ON' : 'OFF';
  document.getElementById('shiny-btn').classList.toggle('on', shiny);
  // update brand pokemon too
  document.getElementById('brand-pkmn').src = SPRITE(133, shiny, gen);
  document.getElementById('head-sprite').src = SPRITE(1, shiny, gen);
  updateWalker();
  renderRows();
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.row').forEach(row => {
    const txt = row.querySelector('.row-title').textContent.toLowerCase();
    row.parentElement.style.display = txt.includes(q) ? '' : 'none';
  });
});

// ── TWEAKS PROTOCOL ──
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks').classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

// ── INIT ──
wi = Math.floor(Math.random() * walkers.length);
updateWalker();
renderRows();
</script>
